<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ラブキャッチ完成版</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:#fff0f5;
  font-family:sans-serif;
}
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🎵BGM
const bgm = new Audio("bgm.mp3");
bgm.loop = true;
bgm.volume = 0.5;

// 🔊キャッチ音
const getSound = new Audio("get.mp3");
getSound.volume = 0.7;

// 画像
const imgBaby = new Image();
imgBaby.src = "baby.png";

const imgAfro = new Image();
imgAfro.src = "afro.png";

const imgProf = new Image();
imgProf.src = "prof.png";

// ▶スタートボタン
const startBtn = document.createElement("button");
startBtn.innerText = "▶ スタート";
startBtn.style.position = "absolute";
startBtn.style.top = "50%";
startBtn.style.left = "50%";
startBtn.style.transform = "translate(-50%, -50%)";
startBtn.style.fontSize = "24px";
startBtn.style.padding = "14px 28px";
startBtn.style.background = "#ff6b81";
startBtn.style.color = "#fff";
startBtn.style.border = "none";
startBtn.style.borderRadius = "12px";
startBtn.style.cursor = "pointer";
startBtn.style.zIndex = "10";
document.body.appendChild(startBtn);

let gameStarted = false;

startBtn.addEventListener("click", () => {
  bgm.play();
  gameStarted = true;
  startBtn.remove();
});

// 描画チェック
function drawItem(item) {
  if (item.img.complete && item.img.naturalWidth !== 0) {
    ctx.drawImage(item.img, item.x, item.y, item.size, item.size);
  } else {
    ctx.font = "40px serif";
    let emoji = "🎓";
    if (item.type === "baby") emoji = "👶";
    if (item.type === "afro") emoji = "🕺";
    ctx.fillText(emoji, item.x, item.y + 40);
  }
}

// ゲーム
let basket = {
  x: canvas.width / 2,
  y: canvas.height - 100,
  w: 120,
  h: 30
};

let items = [];
let score = 0;

document.addEventListener("mousemove", e => {
  basket.x = e.clientX - basket.w / 2;
});

document.addEventListener("touchmove", e => {
  basket.x = e.touches[0].clientX - basket.w / 2;
});

// アイテム生成
function spawnItem() {
  if (!gameStarted) return;

  let rand = Math.random();
  let type = "prof";
  let img = imgProf;
  let value = 5;

  if (rand < 0.2) {
    type = "baby";
    img = imgBaby;
    value = 30;
  } else if (rand < 0.6) {
    type = "afro";
    img = imgAfro;
    value = 10;
  }

  items.push({
    x: Math.random() * (canvas.width - 80),
    y: -80,
    size: 80,
    type,
    img,
    value,
    speed: 2 + Math.random() * 2
  });
}

// 更新
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // カゴ
  ctx.fillStyle = "#ff6b81";
  ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

  items.forEach((item, i) => {
    item.y += item.speed;
    drawItem(item);

    // 当たり判定
    if (
      item.y + item.size > basket.y &&
      item.x + item.size > basket.x &&
      item.x < basket.x + basket.w
    ) {
      score += item.value;

      // 🔊キャッチ音
      getSound.currentTime = 0;
      getSound.play();

      if (item.type === "baby") {
        score += 20;
      }

      items.splice(i, 1);
    }

    if (item.y > canvas.height) {
      items.splice(i, 1);
    }
  });

  ctx.fillStyle = "#333";
  ctx.font = "28px sans-serif";
  ctx.fillText("Love: " + score, 20, 40);

  requestAnimationFrame(update);
}

setInterval(spawnItem, 900);
update();

// リサイズ対応
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  basket.y = canvas.height - 100;
});
</script>

</body>
</html>
