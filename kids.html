<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3分タップゲーム</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#fff7f0, #ffeef5);
    font-family: sans-serif;
  }

  canvas {
    display: block;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }

  #score, #time {
    background: rgba(255,255,255,0.9);
    padding: 8px 16px;
    border-radius: 20px;
    margin-top: 6px;
    font-size: 20px;
    color: #444;
  }

  #startBtn, #retryBtn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    padding: 18px 30px;
    font-size: 26px;
    background: #ff6b81;
    color: #fff;
    border: none;
    border-radius: 15px;
    z-index: 20;
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  }

  #startBtn {
    top: 45%;
    transform: translate(-50%, -50%);
  }

  #retryBtn {
    top: 58%;
    display: none;
  }

  #end {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: #ff4f79;
    display: none;
    z-index: 20;
    text-shadow: 0 2px 0 #fff;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="score">スコア: 0</div>
  <div id="time">のこり: 180</div>
</div>

<div id="end">おわり！✨</div>
<button id="startBtn">スタート！</button>
<button id="retryBtn">もういっかい</button>

<canvas id="game"></canvas>

<audio id="sound" src="get.mp3" preload="auto"></audio>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const timeEl = document.getElementById("time");
  const startBtn = document.getElementById("startBtn");
  const retryBtn = document.getElementById("retryBtn");
  const endEl = document.getElementById("end");
  const sound = document.getElementById("sound");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const files = [
    "baba.png",
    "kei.png",
    "nagomi.png",
    "oyako.png",
    "yukinago.png",
    "karan.png",
    "sauaka.png",
    "uedake.png",
    "reiko.png"
  ];

  const images = files.map(file => {
    const img = new Image();
    img.src = file;
    return img;
  });

  let items = [];
  let effects = [];
  let score = 0;
  let timeLeft = 180;
  let started = false;
  let finished = false;
  let timerId = null;

  function updateUI() {
    scoreEl.textContent = "スコア: " + score;
    timeEl.textContent = "のこり: " + timeLeft;
  }

  function unlockSound() {
    sound.play()
      .then(() => {
        sound.pause();
        sound.currentTime = 0;
      })
      .catch(() => {});
  }

  function randomImage() {
    return images[Math.floor(Math.random() * images.length)];
  }

  function currentSize() {
    return Math.max(70, 140 - score * 0.3);
  }

  function currentSpeed() {
    return Math.min(8, 1.2 + score * 0.03);
  }

  function spawnItem() {
    const size = currentSize();

    items.push({
      img: randomImage(),
      x: Math.random() * Math.max(1, canvas.width - size),
      y: 110 + Math.random() * Math.max(1, canvas.height - size - 130),
      size: size,
      speed: currentSpeed(),
      driftX: (Math.random() - 0.5) * 2,
      driftY: (Math.random() - 0.5) * 2
    });
  }

  function ensureItemCount() {
    while (items.length < 3) {
      spawnItem();
    }
  }

  function createEffect(x, y) {
    for (let i = 0; i < 18; i++) {
      effects.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        life: 26,
        size: 4 + Math.random() * 6,
        color: Math.random() > 0.5 ? "gold" : "#ff8fab"
      });
    }
  }

  function updateEffects() {
    effects = effects.filter(e => {
      e.x += e.vx;
      e.y += e.vy;
      e.vy += 0.15;
      e.life -= 1;
      return e.life > 0;
    });
  }

  function drawEffects() {
    for (const e of effects) {
      ctx.globalAlpha = e.life / 26;
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x, e.y, e.size, e.size);
    }
    ctx.globalAlpha = 1;
  }

  function moveItems() {
    for (const item of items) {
      item.x += item.driftX * item.speed;
      item.y += item.driftY * item.speed;

      if (item.x < 0) {
        item.x = 0;
        item.driftX *= -1;
      }
      if (item.y < 100) {
        item.y = 100;
        item.driftY *= -1;
      }
      if (item.x + item.size > canvas.width) {
        item.x = canvas.width - item.size;
        item.driftX *= -1;
      }
      if (item.y + item.size > canvas.height) {
        item.y = canvas.height - item.size;
        item.driftY *= -1;
      }
    }
  }

  function flee(px, py) {
    for (const item of items) {
      const cx = item.x + item.size / 2;
      const cy = item.y + item.size / 2;
      const dx = cx - px;
      const dy = cy - py;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 150) {
        const nx = dx / (dist || 1);
        const ny = dy / (dist || 1);
        const power = 18 + currentSpeed() * 2.5;

        item.x += nx * power;
        item.y += ny * power;

        if (item.x < 0) item.x = 0;
        if (item.y < 100) item.y = 100;
        if (item.x + item.size > canvas.width) item.x = canvas.width - item.size;
        if (item.y + item.size > canvas.height) item.y = canvas.height - item.size;
      }
    }
  }

  function catchAt(px, py) {
    if (!started || finished) return;

    for (let i = items.length - 1; i >= 0; i--) {
      const item = items[i];
      const hit =
        px >= item.x &&
        px <= item.x + item.size &&
        py >= item.y &&
        py <= item.y + item.size;

      if (hit) {
        score += 1;
        updateUI();

        sound.currentTime = 0;
        sound.play().catch(() => {});

        createEffect(item.x + item.size / 2, item.y + item.size / 2);
        items.splice(i, 1);
        ensureItemCount();
        return;
      }
    }
  }

  function drawBackground() {
    for (let i = 0; i < 7; i++) {
      ctx.fillStyle = i % 2 === 0
        ? "rgba(255, 220, 230, 0.18)"
        : "rgba(255, 235, 180, 0.16)";
      ctx.beginPath();
      ctx.arc(
        (i * 180 + 50) % canvas.width,
        120 + ((i * 120) % Math.max(200, canvas.height - 120)),
        48,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }
  }

  function drawItems() {
    for (const item of items) {
      if (item.img.complete) {
        ctx.drawImage(item.img, item.x, item.y, item.size, item.size);
      } else {
        ctx.fillStyle = "#ddd";
        ctx.fillRect(item.x, item.y, item.size, item.size);
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    drawItems();
    drawEffects();
  }

  function loop() {
    if (started && !finished) {
      moveItems();
      updateEffects();
    } else {
      updateEffects();
    }

    draw();
    requestAnimationFrame(loop);
  }

  function finishGame() {
    finished = true;
    started = false;
    endEl.style.display = "block";
    retryBtn.style.display = "block";
  }

  function startGame() {
    unlockSound();

    score = 0;
    timeLeft = 180;
    items = [];
    effects = [];
    started = true;
    finished = false;

    startBtn.style.display = "none";
    retryBtn.style.display = "none";
    endEl.style.display = "none";

    updateUI();
    ensureItemCount();

    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
      if (!started || finished) return;

      timeLeft -= 1;
      updateUI();

      if (timeLeft <= 0) {
        clearInterval(timerId);
        finishGame();
      }
    }, 1000);
  }

  startBtn.addEventListener("click", startGame);
  retryBtn.addEventListener("click", startGame);

  canvas.addEventListener("mousemove", e => {
    if (started && !finished) flee(e.clientX, e.clientY);
  });

  canvas.addEventListener("touchmove", e => {
    if (started && !finished && e.touches.length > 0) {
      const t = e.touches[0];
      flee(t.clientX, t.clientY);
    }
  }, { passive: true });

  canvas.addEventListener("click", e => {
    catchAt(e.clientX, e.clientY);
  });

  canvas.addEventListener("touchstart", e => {
    unlockSound();
    if (e.touches.length > 0) {
      const t = e.touches[0];
      catchAt(t.clientX, t.clientY);
    }
  }, { passive: true });

  updateUI();
  loop();
</script>

</body>
</html>
